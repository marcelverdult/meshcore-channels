name: build-index

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Strip hashtag-channel keys
        run: node scripts/strip-keys.mjs

      - name: Regenerate channel lists
        run: node scripts/build-index.mjs

      - name: Refresh README status block
        run: node scripts/update-readme-status.mjs

      - name: Commit regenerated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet -- channels channels-by-country.json channels-unique.json README.md; then
            git add channels channels-by-country.json channels-unique.json README.md
            git commit -m 'chore: regenerate channel lists'
            git push origin HEAD:main
          else
            echo 'channel lists already current'
          fi

      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate "repos/${{ github.repository }}/actions/runs" \
            --jq '.workflow_runs[].id' \
          | while read -r id; do
              [ "$id" = "${{ github.run_id }}" ] && continue
              if gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id" >/dev/null 2>&1; then
                echo "deleted run $id"
              else
                echo "skipped run $id (in progress or not deletable)"
              fi
            done
